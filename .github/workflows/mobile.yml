name: Mobile

on:
  push:
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"
  pull_request:
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"

jobs:
  flutter-linux:
    name: Flutter Linux Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/elettra_mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --dart-define=API_BASE_URL=http://127.0.0.1:8000/api/v1

      - name: Build Android debug
        run: flutter build apk --debug --dart-define=API_BASE_URL=http://10.0.2.2:8000/api/v1

  flutter-ios-no-codesign:
    name: Flutter iOS No-Codesign
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile/elettra_mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS without codesigning
        run: flutter build ios --no-codesign --dart-define=API_BASE_URL=http://127.0.0.1:8000/api/v1
