name: Mobile

on:
  push:
    paths:
      - "mobile/**"
      - "scripts/ci/**"
      - ".github/workflows/mobile.yml"
  pull_request:
    paths:
      - "mobile/**"
      - "scripts/ci/**"
      - ".github/workflows/mobile.yml"

jobs:
  flutter-linux:
    name: Flutter Linux Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/elettra_mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Run shared mobile CI script
        run: ../../scripts/ci/mobile.sh

  flutter-ios-no-codesign:
    name: Flutter iOS No-Codesign
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile/elettra_mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build iOS without codesigning
        run: |
          RUN_ANALYZE=false \
          RUN_TESTS=false \
          BUILD_WEB=false \
          BUILD_ANDROID_DEBUG=false \
          BUILD_IOS_NO_CODESIGN=true \
          ../../scripts/ci/mobile.sh
